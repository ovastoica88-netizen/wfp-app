body { font-family: Arial, sans-serif; background: #1B557A; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
.box { background: #fff; border-radius: 16px; padding: 32px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
h2 { color: #1B557A; margin: 0 0 8px; text-align:center; }
.sub { color: #94a3b8; font-size: 13px; margin-bottom: 20px; text-align:center; }
input { width: 100%; padding: 11px; margin-bottom: 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
.btn { width: 100%; padding: 13px; background: #1B557A; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.btn:disabled { background: #94a3b8; }
.btn.green { background: #16a34a; }
.log { margin-top: 16px; font-size: 12px; max-height: 250px; overflow-y: auto; background: #f8fafc; border-radius: 8px; padding: 12px; }
.ok { color: #16a34a; } .err { color: #dc2626; } .info { color: #2563eb; }
#loginBox { display:block; }
#migBox { display:none; }
</style>
</head>
<body>
<div class="box">
  <div style="font-size:36px;text-align:center;">🏥</div>
  <h2>WFP Datenmigration</h2>

  <div id="loginBox">
    <div class="sub">Bitte erst einloggen</div>
    <input id="em" type="email" placeholder="E-Mail">
    <input id="pw" type="password" placeholder="Passwort">
    <button class="btn" id="loginBtn" onclick="doLogin()">Einloggen →</button>
    <div id="loginErr" style="color:#dc2626;font-size:12px;margin-top:8px;text-align:center;"></div>
  </div>

  <div id="migBox">
    <div class="sub">Eingeloggt als <span id="userEmail"></span></div>
    <button class="btn" id="migBtn" onclick="startMigration()">▶ Migration starten</button>
    <div class="log" id="log"></div>
  </div>
</div>

var db = firebase.firestore();

firebase.auth().onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('migBox').style.display = 'block';
    document.getElementById('userEmail').textContent = user.email;
  } else {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('migBox').style.display = 'none';
  }
});

function doLogin() {
  var email = document.getElementById('em').value.trim();
  var pass = document.getElementById('pw').value.trim();
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('loginErr');
  if (!email || !pass) { err.textContent = 'Bitte E-Mail und Passwort eingeben'; return; }
  btn.disabled = true;
  btn.textContent = '⏳ Einloggen...';
  firebase.auth().signInWithEmailAndPassword(email, pass)
    .catch(function(e) {
      btn.disabled = false;
      btn.textContent = 'Einloggen →';
      err.textContent = '❌ ' + (e.code === 'auth/invalid-credential' ? 'Email oder Passwort falsch' : e.message);
    });
}

function log(msg, cls) {
  var d = document.getElementById('log');
  d.innerHTML += '<div class="' + (cls||'info') + '">' + msg + '</div>';
  d.scrollTop = d.scrollHeight;
}

async function writeCol(name, items) {
  log('Schreibe ' + items.length + ' → ' + name + '...');
  // Firestore batch max 500
  for (var i = 0; i < items.length; i += 400) {
    var batch = db.batch();
    items.slice(i, i+400).forEach(function(item) {
      batch.set(db.collection(name).doc(item._id), item);
    });
    await batch.commit();
  }
  log('✅ ' + name + ': fertig (' + items.length + ')', 'ok');
}

async function startMigration() {
  var btn = document.getElementById('migBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Läuft...';
  document.getElementById('log').innerHTML = '';
  log('Start...');
  try {
    await writeCol('wfp_phkp', PHKP);
    await writeCol('wfp_erst', ERST);
    await writeCol('wfp_koop', KOOP);
    log('', '');
    log('🎉 Erfolgreich! ' + PHKP.length + ' Patienten, ' + ERST.length + ' Erstkontakte, ' + KOOP.length + ' Ärzte', 'ok');
    btn.textContent = '→ Zur App';
    btn.classList.add('green');
    btn.disabled = false;
    btn.onclick = function() { window.location.href = 'index.html'; };
  } catch(e) {
    log('❌ Fehler: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = '▶ Nochmal versuchen';
  }
}
